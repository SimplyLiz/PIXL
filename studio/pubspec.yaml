name: pixl_studio
description: "AI-native pixel art editor for the PIXL toolchain"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_markdown: ^0.7.6
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  http: ^1.3.0
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  collection: ^1.19.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
