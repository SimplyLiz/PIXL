name: Release Rust

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tool

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build CLI
        working-directory: tool
        run: cargo build --release --target ${{ matrix.target }} -p pixl-cli

      - name: Build MCP server
        working-directory: tool
        run: cargo build --release --target ${{ matrix.target }} -p pixl-mcp

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          mkdir -p dist
          tar czf "dist/pixl-cli-${tag}-${{ matrix.target }}.tar.gz" \
            -C tool/target/${{ matrix.target }}/release pixl-cli
          tar czf "dist/pixl-mcp-${tag}-${{ matrix.target }}.tar.gz" \
            -C tool/target/${{ matrix.target }}/release pixl-mcp

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path "tool/target/${{ matrix.target }}/release/pixl-cli.exe" `
            -DestinationPath "dist/pixl-cli-${tag}-${{ matrix.target }}.zip"
          Compress-Archive -Path "tool/target/${{ matrix.target }}/release/pixl-mcp.exe" `
            -DestinationPath "dist/pixl-mcp-${tag}-${{ matrix.target }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish pixl-core
        working-directory: tool
        run: cargo publish -p pixl-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
